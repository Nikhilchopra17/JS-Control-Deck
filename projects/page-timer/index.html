<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Timer</title>
<link rel="stylesheet" href="style.css">

</head>
<body>
  <div class="box">
<div class="clock-wrap">
  <h2 class="section-title">Live Clock</h2>
  <div class="clock">
    <div class="clock-face">
      <div class="hand hour-hand"></div>
      <div class="hand min-hand"></div>
      <div class="hand second-hand"></div>
    </div>
  </div>
  <div class="digital-time" id="digitalTime"></div>
</div>

<div class="timer-wrap">
  <h2 class="section-title">Countdown Timer</h2>
  <div class="timer__controls">
    <button data-time="20" class="timer__button">20 Secs</button>
    <button data-time="300" class="timer__button">Work 5</button>
    <button data-time="900" class="timer__button">Quick 15</button>
    <button data-time="1200" class="timer__button">Snack 20</button>
    <button data-time="3600" class="timer__button">Lunch Break</button>
    <form name="customForm" id="custom">
      <input type="number" name="minutes" placeholder="Enter minutes" min="1" max="999" step="1">
      <span class="hint">max 999 minutes</span>
    </form>
  </div>
  <div class="display">
    <h1 class="display__time-left">0:00</h1>
    <p class="display__end-time"></p>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <h3>Time's Up</h3>
    <p>Your countdown has finished.</p>
    <button id="modalClose">Dismiss</button>
  </div>
</div>
  </div>
</body>
<script src="script.js"></script>
</html>

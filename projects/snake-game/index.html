<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="box">

    <div id="gameArea">

      <div id="title">Snake Style Box Game</div>
      <div id="hint">Move with Arrow Keys or WASD</div>

     <div id="player"></div>

     <div id="scoreBoard">Time Score: <span id="score">0</span></div>

      <div id="gameOver">
       <h1>GAME OVER</h1>
       <p>Your Score: <span id="finalScore"></span></p>
       <button id="restartBtn">Play Again</button>
      </div>
    </div>

  </div>
<script src="script.js"></script>
</body>
</html>
